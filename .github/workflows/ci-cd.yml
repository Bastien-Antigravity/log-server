name: CI/CD

on:
  push:
    branches: [develop, main]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Enable cargo-clippy and cargo-fmt 
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          components: clippy, rustfmt
          
      - uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler capnproto
        
      - name: Check formatting
        run: cargo fmt --all -- --check
        
      - name: Run clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"
          
      - uses: Swatinem/rust-cache@v2
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler capnproto
        
      - name: Run all tests
        run: cargo test

  adversarial-validation:
    name: Protocol Hardening (Adversarial)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Log-Server
        uses: actions/checkout@v6
        with:
          path: log-server

      - name: Checkout Sandbox-Testing
        uses: actions/checkout@v6
        with:
          repository: Bastien-Antigravity/sandbox-testing
          path: sandbox-testing
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.91"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler capnproto

      - name: Build Log-Server
        run: |
          cd log-server
          cargo build
          echo "SERVER_BIN=$(pwd)/target/debug/log-server" >> $GITHUB_ENV

      - name: Run Adversarial Tests
        run: |
          # Start log-server in background
          ${{ env.SERVER_BIN }} --port 15000 --grpc-port 15001 &
          SERVER_PID=$!
          
          # Give it a moment to start
          sleep 5
          
          # Run tests from sandbox-testing
          cd sandbox-testing/implementations/go
          go test -v .
          
          # Cleanup
          kill $SERVER_PID

  build-push:
    name: Build & Push Docker
    needs: adversarial-validation
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
